events {
    worker_connections 1024;
}

http {
    # Use Docker's embedded DNS resolver for dynamic resolution
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # CORS headers map (must be in http block, not server block)
    map $request_method $cors_method {
        OPTIONS 1;
        default 0;
    }

    server {
        listen 80;
        server_name localhost;

        # Define service URLs as variables for dynamic resolution
        set $crawler_url http://crawler-service:8001;
        set $ocr_url http://ocr-service:8002;
        set $nlp_url http://nlp-service:8003;
        set $compliance_url http://compliance-engine:8004;
        set $rule_url http://rule-engine:8005;
        set $reporting_url http://reporting-service:8006;

        # Add CORS headers to all responses
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health check endpoint
        location /health {
            return 200 '{"status": "healthy", "service": "api-gateway"}';
            add_header Content-Type application/json;
        }

        # Root endpoint
        location = / {
            return 200 '{"service": "legal-compliance-api-gateway", "version": "1.0.0"}';
            add_header Content-Type application/json;
        }

        # URL Audit / Crawler Service
        location /audit/url {
            proxy_pass $crawler_url/crawl;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # OCR Service
        location /audit/ocr {
            proxy_pass $ocr_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
            proxy_read_timeout 120s;
        }

        # Compliance audit endpoints
        location ~ ^/audit/(reports|audits|stats|export) {
            proxy_pass $compliance_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            rewrite ^/audit(/.*)$ /compliance$1 break;
        }

        # Category audit endpoints
        location ~ ^/audit/(categories|category|bulk) {
            proxy_pass $compliance_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Generic /audit catch-all - route to compliance engine
        location /audit {
            proxy_pass $compliance_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            rewrite ^/audit(/.*)$ /compliance/audit$1 break;
        }

        # API v1 routes for direct service access
        # Crawler Service
        location /api/v1/crawl {
            proxy_pass $crawler_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # OCR Service
        location /api/v1/ocr {
            proxy_pass $ocr_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
            proxy_read_timeout 120s;
        }

        # NLP Service
        location /api/v1/nlp {
            proxy_pass $nlp_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compliance Engine
        location /api/v1/compliance {
            proxy_pass $compliance_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Rule Engine
        location /api/v1/rules {
            proxy_pass $rule_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Reporting Service
        location /api/v1/reports {
            proxy_pass $reporting_url;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error handling
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            return 500 '{"error": "Internal Server Error", "message": "Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
