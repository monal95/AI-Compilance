global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "crawler-service"
    static_configs:
      - targets: ["crawler-service:8001"]
    metrics_path: "/metrics"

  - job_name: "ocr-service"
    static_configs:
      - targets: ["ocr-service:8002"]
    metrics_path: "/metrics"

  - job_name: "nlp-service"
    static_configs:
      - targets: ["nlp-service:8003"]
    metrics_path: "/metrics"

  - job_name: "compliance-engine"
    static_configs:
      - targets: ["compliance-engine:8004"]
    metrics_path: "/metrics"

  - job_name: "rule-engine"
    static_configs:
      - targets: ["rule-engine:8005"]
    metrics_path: "/metrics"

  - job_name: "reporting-service"
    static_configs:
      - targets: ["reporting-service:8006"]
    metrics_path: "/metrics"
