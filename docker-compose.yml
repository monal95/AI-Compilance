services:
  # ========================
  # Infrastructure Services
  # ========================
  
  mongodb:
    image: mongo:7.0
    container_name: compliance-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-compliance_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-compliance_secret}
      MONGO_INITDB_DATABASE: compliance_db
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compliance-network

  redis:
    image: redis:7-alpine
    container_name: compliance-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compliance-network

  # ========================
  # Microservices
  # ========================

  crawler-service:
    build:
      context: .
      dockerfile: services/crawler-service/Dockerfile
    container_name: compliance-crawler
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-compliance_admin}:${MONGO_PASSWORD:-compliance_secret}@mongodb:27017/compliance_db?authSource=admin
      - REDIS_URI=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - compliance-network

  ocr-service:
    build:
      context: .
      dockerfile: services/ocr-service/Dockerfile
    container_name: compliance-ocr
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-compliance_admin}:${MONGO_PASSWORD:-compliance_secret}@mongodb:27017/compliance_db?authSource=admin
      - REDIS_URI=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    networks:
      - compliance-network

  nlp-service:
    build:
      context: .
      dockerfile: services/nlp-service/Dockerfile
    container_name: compliance-nlp
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-compliance_admin}:${MONGO_PASSWORD:-compliance_secret}@mongodb:27017/compliance_db?authSource=admin
      - REDIS_URI=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    networks:
      - compliance-network

  compliance-engine:
    build:
      context: .
      dockerfile: services/compliance-engine/Dockerfile
    container_name: compliance-engine
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-compliance_admin}:${MONGO_PASSWORD:-compliance_secret}@mongodb:27017/compliance_db?authSource=admin
      - REDIS_URI=redis://redis:6379
      - OCR_SERVICE_URL=http://ocr-service:8002
      - NLP_SERVICE_URL=http://nlp-service:8003
      - RULE_ENGINE_URL=http://rule-engine:8005
      - LOG_LEVEL=INFO
    depends_on:
      - mongodb
      - redis
      - ocr-service
      - nlp-service
      - rule-engine
    networks:
      - compliance-network

  rule-engine:
    build:
      context: .
      dockerfile: services/rule-engine/Dockerfile
    container_name: compliance-rule-engine
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-compliance_admin}:${MONGO_PASSWORD:-compliance_secret}@mongodb:27017/compliance_db?authSource=admin
      - REDIS_URI=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - compliance-network

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting-service/Dockerfile
    container_name: compliance-reporting
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-compliance_admin}:${MONGO_PASSWORD:-compliance_secret}@mongodb:27017/compliance_db?authSource=admin
      - REDIS_URI=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - compliance-network

  # ========================
  # API Gateway (Optional)
  # ========================
  
  api-gateway:
    image: nginx:alpine
    container_name: compliance-gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crawler-service
      - ocr-service
      - nlp-service
      - compliance-engine
      - rule-engine
      - reporting-service
    networks:
      - compliance-network

  # ========================
  # Monitoring (Optional)
  # ========================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: compliance-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - compliance-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: compliance-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - compliance-network
    profiles:
      - monitoring

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  compliance-network:
    driver: bridge
